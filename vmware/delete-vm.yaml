---
- name: delete vm
  gather_facts: false
  hosts: localhost
  tasks: 
  - name:  Delete a virtual machine 
    community.vmware.vmware_guest:
      hostname: purecz-vc-01
      username: Administrator@vsphere.local
      password: "{{ password }}"
      datacenter: PureCZ
      state: absent
      cluster: Everpure
      folder: /jacint
      name: jj-{{ vmname }}
      validate_certs: false
    delegate_to: localhost
...

